<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweepstake FIFA Mode</title>

<meta name="theme-color" content="#0a0f1e">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, Arial;
  background:#070b16;
  color:white;
}

/* TOP HEADER (FIFA STYLE) */
.header {
  padding:18px;
  background:linear-gradient(135deg,#111c33,#070b16);
  border-bottom:2px solid #c8a84b;
}

.title {
  font-size:20px;
  font-weight:900;
  letter-spacing:1px;
}

.sub {
  font-size:12px;
  color:#8a93a6;
}

/* MAIN GRID FEEL */
.container {
  padding:14px;
  max-width:520px;
  margin:auto;
  padding-bottom:90px;
}

/* FIFA MENU CARDS */
.menuCard {
  background: linear-gradient(135deg,#111827,#0d1520);
  border:1px solid #1f2a44;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transform:scale(1);
  transition:0.2s;
}

.menuCard:active {
  transform:scale(0.97);
  border-color:#c8a84b;
}

/* LEADERBOARD CARD */
.player {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  background:#0d1520;
  border-radius:14px;
  margin-bottom:8px;
  border:1px solid #1e2d4a;
  transition:0.2s;
}

.player:active {
  transform:scale(0.98);
  border-color:#c8a84b;
}

.name {
  font-weight:700;
}

.score {
  font-size:18px;
  font-weight:900;
  color:#c8a84b;
}

/* SELECTS */
select,input {
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:#0b1220;
  color:white;
  outline:none;
}

/* FIFA BUTTON */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#c8a84b,#b08d2e);
  font-weight:900;
  color:#0a0f1e;
  cursor:pointer;
  transition:0.2s;
}

button:active {
  transform:scale(0.97);
}

/* BOTTOM NAV */
.nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:#0b1220;
  border-top:1px solid #1f2a44;
}

.nav button {
  flex:1;
  background:none;
  color:#7f8aa3;
  font-size:12px;
  padding:14px;
}

.nav .active {
  color:#c8a84b;
}

/* SMALL ANIMATION */
.fade {
  animation:fade 0.3s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🏆 S W E E P S T A K E</div>
  <div class="sub">FIFA Career Mode • Player League</div>
</div>

<div class="container">

<!-- ADD MATCH -->
<div id="addPage" class="fade">

  <div class="menuCard">
    <h3>⚽ Add Match Result</h3>

    <select id="home"></select>
    <select id="away"></select>

    <input id="hg" type="number" placeholder="Home goals">
    <input id="ag" type="number" placeholder="Away goals">

    <button onclick="addMatch()">SAVE RESULT</button>
  </div>

</div>

<!-- LEADERBOARD -->
<div id="boardPage" style="display:none" class="fade">
  <div id="board"></div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <button class="active" onclick="nav('add',this)">➕ HOME</button>
  <button onclick="nav('board',this)">🏆 STANDINGS</button>
</div>

<script>

/* ---------------- PLAYERS ---------------- */

const PLAYERS=[
  {name:"Paul",teams:["Canada","Iran","Australia","United States","France","Brazil"]},
  {name:"Joanne",teams:["Sweden","Egypt","Jordan","Tunisia","Spain","Portugal"]},
  {name:"Cameron",teams:["Netherlands","Panama","Iraq","Uruguay","Belgium","Croatia"]},
  {name:"Ashley",teams:["South Africa","England","Algeria","Cape Verde Islands","Paraguay","Czech Republic"]},
  {name:"Jessica",teams:["Bosnia and Herzegovina","Switzerland","Congo DR","Mexico","New Zealand","Colombia"]},
  {name:"Evie",teams:["Ecuador","Morocco","Qatar","Uzbekistan","Scotland","Korea Republic"]},
  {name:"Tristan",teams:["Argentina","Côte d'Ivoire","Haiti","Saudi Arabia","Senegal","Austria"]},
  {name:"Josh",teams:["Turkey","Norway","Curaçao","Ghana","Japan","Germany"]}
];

let matches=JSON.parse(localStorage.getItem("matches")||"[]");
const allTeams=[...new Set(PLAYERS.flatMap(p=>p.teams))];

/* ---------------- INIT ---------------- */

function init(){
  const h=document.getElementById("home");
  const a=document.getElementById("away");

  allTeams.forEach(t=>{
    h.innerHTML+=`<option>${t}</option>`;
    a.innerHTML+=`<option>${t}</option>`;
  });

  render();
}
init();

/* ---------------- SCORE ---------------- */

function empty(){return{w:0,d:0};}
function pts(s){return s.w+s.d*0.5;}

/* ---------------- ADD MATCH ---------------- */

function addMatch(){
  const home=homeSel().value;
  const away=awaySel().value;
  const hg=+document.getElementById("hg").value;
  const ag=+document.getElementById("ag").value;

  if(home===away) return alert("Pick different teams");

  matches.push({home,away,hg,ag});
  localStorage.setItem("matches",JSON.stringify(matches));

  document.getElementById("hg").value="";
  document.getElementById("ag").value="";

  render();
}

function homeSel(){return document.getElementById("home");}
function awaySel(){return document.getElementById("away");}

/* ---------------- BUILD ---------------- */

function build(){
  const t={};
  allTeams.forEach(x=>t[x]=empty());

  matches.forEach(m=>{
    if(m.hg>m.ag) t[m.home].w++;
    else if(m.ag>m.hg) t[m.away].w++;
    else{
      t[m.home].d++;
      t[m.away].d++;
    }
  });

  return t;
}

/* ---------------- RENDER (FIFA STYLE) ---------------- */

function render(){
  const t=build();

  const board=PLAYERS.map(p=>{
    const total=p.teams.reduce((s,x)=>s+pts(t[x]),0);
    return{name:p.name,total};
  }).sort((a,b)=>b.total-a.total);

  document.getElementById("board").innerHTML=
    board.map((p,i)=>`
      <div class="player">
        <div class="name">${i===0?"🏆 ":""}${p.name}</div>
        <div class="score">${p.total.toFixed(1)}</div>
      </div>
    `).join("");
}

/* ---------------- NAV ---------------- */

function nav(page,el){
  document.getElementById("addPage").style.display=page==="add"?"block":"none";
  document.getElementById("boardPage").style.display=page==="board"?"block":"none";

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

</script>

</body>
</html>
