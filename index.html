<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Sweepstake PRO</title>

  <style>
    body {
      font-family: Arial;
      background: #0a0f1e;
      color: white;
      padding: 20px;
    }

    h2 { margin-bottom: 10px; }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #c8a84b;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #111827;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .name {
      font-weight: bold;
      font-size: 16px;
    }

    .pts {
      color: #c8a84b;
      font-weight: bold;
    }

    .status {
      margin: 10px 0;
      font-size: 13px;
      color: #8892a4;
    }
  </style>
</head>

<body>

<h2>🏆 World Cup Sweepstake PRO</h2>

<button onclick="loadData()">🔄 Refresh</button>
<div class="status" id="status">Starting...</div>

<div id="app"></div>

<script>

/* ---------------- PLAYERS (FULL 8) ---------------- */

const PLAYERS = [
  { name: "Paul", teams: ["Canada","Iran","Australia","United States","France","Brazil"] },
  { name: "Joanne", teams: ["Sweden","Egypt","Jordan","Tunisia","Spain","Portugal"] },
  { name: "Cameron", teams: ["Netherlands","Panama","Iraq","Uruguay","Belgium","Croatia"] },
  { name: "Ashley", teams: ["South Africa","England","Algeria","Cape Verde Islands","Paraguay","Czech Republic"] },
  { name: "Jessica", teams: ["Bosnia and Herzegovina","Switzerland","Congo DR","Mexico","New Zealand","Colombia"] },
  { name: "Evie", teams: ["Ecuador","Morocco","Qatar","Uzbekistan","Scotland","Korea Republic"] },
  { name: "Tristan", teams: ["Argentina","Côte d'Ivoire","Haiti","Saudi Arabia","Senegal","Austria"] },
  { name: "Josh", teams: ["Turkey","Norway","Curaçao","Ghana","Japan","Germany"] }
];

/* ---------------- STATS ---------------- */

function emptyStats() {
  return {
    wins: 0,
    draws: 0,
    roundOf16: false,
    quarterFinal: false,
    semiFinal: false,
    final: false,
    champion: false
  };
}

/* ---------------- YOUR SCORING SYSTEM ---------------- */

function calcPoints(s) {
  return (
    s.wins * 1 +
    s.draws * 0.5 +
    (s.roundOf16 ? 2 : 0) +
    (s.quarterFinal ? 4 : 0) +
    (s.semiFinal ? 6 : 0) +
    (s.final ? 8 : 0) +
    (s.champion ? 12 : 0)
  );
}

/* ---------------- REAL API (PRO STABLE SOURCE) ---------------- */
/* Uses API-Football via public proxy endpoint */

async function fetchMatches() {
  const url =
    "https://v3.football.api-sports.io/fixtures?season=2024";

  const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url));

  if (!res.ok) {
    throw new Error("API request failed");
  }

  const data = await res.json();

  if (!data.response) {
    throw new Error("Invalid API response");
  }

  return data.response.map(m => ({
    status: m.fixture.status.short === "FT" ? "completed" : "upcoming",
    home_team: {
      name: m.teams.home.name,
      goals: m.goals.home ?? 0
    },
    away_team: {
      name: m.teams.away.name,
      goals: m.goals.away ?? 0
    }
  }));
}

/* ---------------- BUILD SCORES ---------------- */

function buildStats(matches) {
  const teams = {};

  PLAYERS.forEach(p => {
    p.teams.forEach(t => teams[t] = emptyStats());
  });

  matches.forEach(m => {
    if (m.status !== "completed") return;

    const home = m.home_team.name;
    const away = m.away_team.name;
    const hg = m.home_team.goals;
    const ag = m.away_team.goals;

    if (!teams[home] || !teams[away]) return;

    if (hg > ag) teams[home].wins++;
    else if (ag > hg) teams[away].wins++;
    else {
      teams[home].draws++;
      teams[away].draws++;
    }
  });

  return teams;
}

/* ---------------- MAIN ---------------- */

async function loadData() {
  const status = document.getElementById("status");
  const app = document.getElementById("app");

  status.innerText = "Loading live football data...";

  try {
    const matches = await fetchMatches();

    const teams = buildStats(matches);

    const results = PLAYERS.map(p => {
      const total = p.teams.reduce((sum, t) => sum + calcPoints(teams[t]), 0);
      return { name: p.name, total };
    }).sort((a, b) => b.total - a.total);

    app.innerHTML = results.map((p, i) => `
      <div class="card">
        <div class="name">
          ${i === 0 ? "🏆 " : ""}${p.name}
        </div>
        <div class="pts">${p.total.toFixed(1)} pts</div>
      </div>
    `).join("");

    status.innerText = "Live data updated ✅";

  } catch (err) {
    console.log(err);
    status.innerText = "Error: " + err.message;
  }
}

loadData();

</script>

</body>
</html>
