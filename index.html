<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweepstake Tracker FIFA</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,Arial;
  background:#070b16;
  color:white;
}

/* HEADER */
.header{
  padding:18px;
  background:linear-gradient(135deg,#111c33,#070b16);
  border-bottom:2px solid #c8a84b;
}
.title{font-size:20px;font-weight:900;}
.sub{font-size:12px;color:#8a93a6;}

/* LAYOUT */
.container{
  padding:14px;
  max-width:520px;
  margin:auto;
  padding-bottom:90px;
}

/* CARD */
.card{
  background:#111827;
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
}

/* PLAYER ROW */
.row{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#0d1520;
  border-radius:12px;
  margin-bottom:8px;
}

/* INPUTS */
select,input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#0b1220;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#c8a84b;
  font-weight:900;
  cursor:pointer;
}

/* SECONDARY BUTTON */
.secondary{
  background:#3a4a5a;
  color:white;
  margin-top:6px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:#0b1220;
  border-top:1px solid #1e2d4a;
}

.nav button{
  flex:1;
  background:none;
  color:#7f8aa3;
  font-size:12px;
  padding:14px;
}

.nav .active{
  color:#c8a84b;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🏆 Sweepstake Tracker</div>
  <div class="sub">Final FIFA Mode • Full Control</div>
</div>

<div class="container">

<!-- ADD PAGE -->
<div id="addPage">

  <div class="card">
    <h3>⚽ Add Match</h3>

    <select id="home"></select>
    <select id="away"></select>

    <input id="hg" type="number" placeholder="Home goals">
    <input id="ag" type="number" placeholder="Away goals">

    <button onclick="addMatch()">Save Result</button>
    <button class="secondary" onclick="undoLast()">↩️ Undo Last</button>
  </div>

</div>

<!-- BOARD -->
<div id="boardPage" style="display:none">
  <div id="board"></div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <button class="active" onclick="nav('add',this)">➕ Add</button>
  <button onclick="nav('board',this)">🏆 Board</button>
</div>

<script>

/* ---------------- PLAYERS ---------------- */

const PLAYERS=[
  {name:"Paul",teams:["Canada","Iran","Australia","United States","France","Brazil"]},
  {name:"Joanne",teams:["Sweden","Egypt","Jordan","Tunisia","Spain","Portugal"]},
  {name:"Cameron",teams:["Netherlands","Panama","Iraq","Uruguay","Belgium","Croatia"]},
  {name:"Ashley",teams:["South Africa","England","Algeria","Cape Verde Islands","Paraguay","Czech Republic"]},
  {name:"Jessica",teams:["Bosnia and Herzegovina","Switzerland","Congo DR","Mexico","New Zealand","Colombia"]},
  {name:"Evie",teams:["Ecuador","Morocco","Qatar","Uzbekistan","Scotland","Korea Republic"]},
  {name:"Tristan",teams:["Argentina","Côte d'Ivoire","Haiti","Saudi Arabia","Senegal","Austria"]},
  {name:"Josh",teams:["Turkey","Norway","Curaçao","Ghana","Japan","Germany"]}
];

let matches=JSON.parse(localStorage.getItem("matches")||"[]");
let history=[];

const allTeams=[...new Set(PLAYERS.flatMap(p=>p.teams))];

/* ---------------- INIT ---------------- */

function init(){
  const h=document.getElementById("home");
  const a=document.getElementById("away");

  allTeams.forEach(t=>{
    h.innerHTML+=`<option>${t}</option>`;
    a.innerHTML+=`<option>${t}</option>`;
  });

  render();
}
init();

/* ---------------- SCORE ---------------- */

function empty(){return{w:0,d:0};}
function pts(s){return s.w+s.d*0.5;}

/* ---------------- ADD ---------------- */

function addMatch(){
  const home=homeSel().value;
  const away=awaySel().value;
  const hg=+document.getElementById("hg").value;
  const ag=+document.getElementById("ag").value;

  if(home===away) return alert("Pick different teams");

  matches.push({home,away,hg,ag});
  localStorage.setItem("matches",JSON.stringify(matches));

  document.getElementById("hg").value="";
  document.getElementById("ag").value="";

  render();
}

/* ---------------- UNDO ---------------- */

function undoLast(){
  if(matches.length===0) return alert("No matches");

  const last=matches.pop();
  history.push(last);

  localStorage.setItem("matches",JSON.stringify(matches));
  render();
}

/* ---------------- EDIT ---------------- */

function editMatch(i){
  const m=matches[i];

  const home=prompt("Home team",m.home);
  const away=prompt("Away team",m.away);
  const hg=prompt("Home goals",m.hg);
  const ag=prompt("Away goals",m.ag);

  if(!home||!away) return;

  matches[i]={home,away,hg:+hg,ag:+ag};
  localStorage.setItem("matches",JSON.stringify(matches));
  render();
}

/* ---------------- DELETE ---------------- */

function deleteMatch(i){
  matches.splice(i,1);
  localStorage.setItem("matches",JSON.stringify(matches));
  render();
}

/* ---------------- BUILD ---------------- */

function build(){
  const t={};
  allTeams.forEach(x=>t[x]=empty());

  matches.forEach(m=>{
    if(m.hg>m.ag) t[m.home].w++;
    else if(m.ag>m.hg) t[m.away].w++;
    else{
      t[m.home].d++;
      t[m.away].d++;
    }
  });

  return t;
}

/* ---------------- RENDER ---------------- */

function render(){
  const t=build();

  const board=PLAYERS.map(p=>{
    const total=p.teams.reduce((s,x)=>s+pts(t[x]),0);
    return{name:p.name,total};
  }).sort((a,b)=>b.total-a.total);

  document.getElementById("board").innerHTML=
    board.map((p,i)=>`
      <div class="row">
        <div>${i===0?"🏆 ":""}${p.name}</div>
        <div style="color:#c8a84b;font-weight:900">${p.total.toFixed(1)}</div>
      </div>
    `).join("") +

    `<div class="card">
      <h3>📋 Match History</h3>

      ${matches.map((m,i)=>`
        <div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #1e2d4a;font-size:12px;">
          <span>${m.home} ${m.hg}-${m.ag} ${m.away}</span>

          <div style="display:flex;gap:6px;">
            <button onclick="editMatch(${i})" style="padding:4px 6px;font-size:10px;background:#c8a84b;color:black;">Edit</button>
            <button onclick="deleteMatch(${i})" style="padding:4px 6px;font-size:10px;background:#e07a5e;">X</button>
          </div>
        </div>
      `).join("")}

    </div>`;
}

/* ---------------- NAV ---------------- */

function nav(page,el){
  document.getElementById("addPage").style.display=page==="add"?"block":"none";
  document.getElementById("boardPage").style.display=page==="board"?"block":"none";

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

function homeSel(){return document.getElementById("home");}
function awaySel(){return document.getElementById("away");}

</script>

</body>
</html>
