<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Sweepstake Manual</title>

  <style>
    body {
      font-family: Arial;
      background: #0a0f1e;
      color: white;
      padding: 20px;
    }

    h2 { margin-bottom: 10px; }

    input, select, button {
      padding: 10px;
      margin: 5px 0;
      border-radius: 6px;
      border: none;
      width: 100%;
    }

    button {
      background: #c8a84b;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #111827;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .team {
      flex: 1;
    }

    .pts {
      color: #c8a84b;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🏆 Sweepstake Tracker (Manual)</h2>

<p>Add match result → leaderboard updates instantly</p>

<div class="card">
  <h3>Add Match Result</h3>

  <input id="home" placeholder="Home team (exact name)" />
  <input id="away" placeholder="Away team (exact name)" />

  <div class="row">
    <input id="homeGoals" type="number" placeholder="Home goals" />
    <input id="awayGoals" type="number" placeholder="Away goals" />
  </div>

  <button onclick="addMatch()">Add Result</button>
</div>

<h3>Leaderboard</h3>
<div id="leaderboard"></div>

<script>

/* ---------------- PLAYERS ---------------- */

const PLAYERS = [
  { name: "Paul", teams: ["Canada","Iran","Australia","United States","France","Brazil"] },
  { name: "Joanne", teams: ["Sweden","Egypt","Jordan","Tunisia","Spain","Portugal"] },
  { name: "Cameron", teams: ["Netherlands","Panama","Iraq","Uruguay","Belgium","Croatia"] },
  { name: "Ashley", teams: ["South Africa","England","Algeria","Cape Verde Islands","Paraguay","Czech Republic"] },
  { name: "Jessica", teams: ["Bosnia and Herzegovina","Switzerland","Congo DR","Mexico","New Zealand","Colombia"] },
  { name: "Evie", teams: ["Ecuador","Morocco","Qatar","Uzbekistan","Scotland","Korea Republic"] },
  { name: "Tristan", teams: ["Argentina","Côte d'Ivoire","Haiti","Saudi Arabia","Senegal","Austria"] },
  { name: "Josh", teams: ["Turkey","Norway","Curaçao","Ghana","Japan","Germany"] }
];

/* ---------------- STORAGE ---------------- */

let matches = JSON.parse(localStorage.getItem("matches")) || [];

/* ---------------- SCORING ---------------- */

function emptyStats() {
  return { wins:0, draws:0 };
}

function calcPoints(s) {
  return s.wins * 1 + s.draws * 0.5;
}

/* ---------------- ADD MATCH ---------------- */

function addMatch() {
  const home = document.getElementById("home").value.trim();
  const away = document.getElementById("away").value.trim();
  const hg = Number(document.getElementById("homeGoals").value);
  const ag = Number(document.getElementById("awayGoals").value);

  if (!home || !away || isNaN(hg) || isNaN(ag)) return alert("Fill all fields");

  matches.push({ home, away, hg, ag });

  localStorage.setItem("matches", JSON.stringify(matches));

  document.getElementById("home").value = "";
  document.getElementById("away").value = "";
  document.getElementById("homeGoals").value = "";
  document.getElementById("awayGoals").value = "";

  render();
}

/* ---------------- BUILD SCORES ---------------- */

function buildScores() {
  const teams = {};

  PLAYERS.forEach(p => {
    p.teams.forEach(t => teams[t] = emptyStats());
  });

  matches.forEach(m => {
    if (!teams[m.home] || !teams[m.away]) return;

    if (m.hg > m.ag) teams[m.home].wins++;
    else if (m.ag > m.hg) teams[m.away].wins++;
    else {
      teams[m.home].draws++;
      teams[m.away].draws++;
    }
  });

  return teams;
}

/* ---------------- RENDER ---------------- */

function render() {
  const teams = buildScores();

  const results = PLAYERS.map(p => {
    const total = p.teams.reduce((sum, t) => sum + calcPoints(teams[t]), 0);
    return { name: p.name, total };
  }).sort((a,b) => b.total - a.total);

  document.getElementById("leaderboard").innerHTML =
    results.map((p, i) => `
      <div class="card">
        <div>
          ${i === 0 ? "🏆 " : ""}${p.name}
        </div>
        <div class="pts">${p.total.toFixed(1)} pts</div>
      </div>
    `).join("");
}

render();

</script>

</body>
</html>
